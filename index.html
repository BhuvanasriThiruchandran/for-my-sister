<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Dearest Sister 🎀</title>
    <style>
        :root {
            --pink: #ffb7c5;
            --dark-pink: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.98);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif; background: #fff5f7; overflow: hidden;
        }

        /* --- BACKGROUND COLLAGE --- */
        #collage-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.4; pointer-events: none;
            display: grid; 
            grid-template-columns: repeat(8, 1fr); 
            grid-template-rows: repeat(8, 1fr);    
            gap: 2px;
            background: white;
        }
        .bg-photo-slot { width: 100%; height: 100%; object-fit: cover; }

        .bg-gradient {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(-45deg, #fff5f7, #ffe5ec, #ffdee9, #fff5f7);
            background-size: 400% 400%; animation: gradientBG 10s ease infinite; 
            z-index: 0;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        #heart-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        #main-container { position: relative; z-index: 10; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }

        .aesthetic-card {
            background: var(--glass); backdrop-filter: blur(15px);
            padding: 40px; border-radius: 50px;
            box-shadow: 0 20px 60px rgba(255, 77, 109, 0.25);
            text-align: center; width: 90%; max-width: 500px;
            min-height: 480px; border: 3px solid white; 
            animation: float 4s ease-in-out infinite;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .page { display: none; width: 100%; flex-direction: column; align-items: center; }
        .page.active { display: flex; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .btn-main {
            background: linear-gradient(45deg, #ff4d6d, #ff8fa3);
            color: white; border: none; padding: 18px 45px; border-radius: 50px;
            cursor: pointer; font-weight: 700; font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.4); 
            text-transform: uppercase; letter-spacing: 1px;
            transition: transform 0.2s; margin-top: 25px;
        }
        .btn-main:hover { transform: scale(1.05); }

        .photo-grid { display: flex; gap: 15px; justify-content: center; margin: 20px 0; width: 100%; }
        .polaroid { background: white; padding: 8px 8px 20px 8px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 110px; }
        .polaroid img { width: 100%; height: 100px; object-fit: cover; border: 1px solid #f0f0f0; }

        .wish-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; width: 100%; }
        .wish-box { 
            background: #fff; padding: 12px 8px; border-radius: 20px; 
            font-size: 0.85rem; cursor: pointer; border: 2px dashed #ffb7c5; 
            color: rgba(255, 77, 109, 0); 
            transition: color 0.8s ease-in-out, background 0.5s ease; 
            font-weight: 600; overflow: hidden; position: relative;
            display: flex; align-items: center; justify-content: center;
            min-height: 40px;
        }
        .wish-box::before {
            content: attr(data-label);
            color: var(--dark-pink);
            position: absolute;
            transition: opacity 0.3s ease;
        }
        .wish-box.revealed::before { opacity: 0; }
        .wish-box.revealed {
            color: rgba(255, 77, 109, 1);
            background: #fffafb;
            border: 2px solid #ffb7c5;
        }

        #music-btn { position: fixed; bottom: 25px; left: 25px; z-index: 100; background: white; border-radius: 50%; border: none; width: 60px; height: 60px; font-size: 24px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .interactive-pic { width: 220px; border-radius: 25px; border: 6px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.2); cursor: pointer; }
        .particle { position: fixed; pointer-events: none; z-index: 9999; font-size: 28px; filter: drop-shadow(0 0 5px rgba(255,255,255,0.8)); }
        .typewriter { font-size: 1rem; color: #4a4a4a; line-height: 1.6; margin-top: 20px; min-height: 80px; }

        /* --- SNOWFALL EFFECT --- */
        .falling-heart {
            position: fixed; top: -20px; user-select: none; pointer-events: none;
            z-index: 15; animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div id="collage-background"></div> 
    <canvas id="heart-canvas"></canvas>
    
    <audio id="bg-music" loop><source src="saavane-happy-birthday-254480.mp3" type="audio/mpeg"></audio>
    <button id="music-btn" onclick="toggleMusic()">🎵</button>

    <div id="main-container">
        <section class="page active" id="page1">
            <div class="aesthetic-card">
                <img src=" IMG-20221127-WA0026.jpg" 
                     style="width: 180px; height: 180px; object-fit: cover; border-radius: 20px; border: 6px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: block; margin: 0 auto 20px auto;">
                <h1 style="color: var(--dark-pink); margin: 15px 0;">Happy Birthday Deebhoo! ❤️</h1>
                <p>Ready to see your gift?</p>
                <button class="btn-main" onclick="startApp()">Yes! 🎁</button>
            </div>
        </section>

        <section class="page" id="page2">
            <div class="aesthetic-card">
                <h2 style="color: var(--dark-pink);">Our Memories 📸</h2>
                <div class="photo-grid">
                    <div class="polaroid" style="transform: rotate(-3deg);"><img src=" DSC_0159-01(1)-01.jpeg"></div>
                    <div class="polaroid" style="transform: rotate(2deg);"><img src=" DSC_0570.JPG"></div>
                    <div class="polaroid" style="transform: rotate(-2deg);"><img src=" Snapchat-784488938-01.jpeg"></div>
                </div>
                <div class="wish-grid">
                    <div class="wish-box" data-label="Message 1 ✨" onclick="reveal(this, 0)"></div>
                    <div class="wish-box" data-label="Message 2 ✨" onclick="reveal(this, 1)"></div>
                    <div class="wish-box" data-label="Message 3 ✨" onclick="reveal(this, 2)"></div>
                    <div class="wish-box" data-label="Message 4 ✨" onclick="reveal(this, 3)"></div>
                </div>
                <button class="btn-main" onclick="nextPage(2, 3)">Wait, there's more! ✨</button>
            </div>
        </section>

        <section class="page" id="page3">
            <div class="aesthetic-card">
                <h1 style="color: var(--dark-pink); font-size: 1.8rem;">Always Luv U Deebhu ❤️</h1>
                <img src=" IMG-20211019-WA0009.jpg" id="final-pic" class="interactive-pic" onclick="hugeExplosion()">
                <div id="typewriter-text" class="typewriter"></div>
                <button class="btn-main" onclick="goToCake()">Celebrate! 🎆</button>
            </div>
        </section>

        <section class="page" id="page4">
            <div class="aesthetic-card">
                <h2 style="color: var(--dark-pink);" id="cake-header">Make a Wish! 🎂</h2>
                
                <div id="cake-display" 
                     style="font-size: 100px; margin: 20px 0; cursor: pointer; transition: all 0.4s ease;" 
                     onclick="cutCake()">🎂</div>
                
                <p id="cake-msg" style="font-weight: 600; color: #4a4a4a; line-height: 1.6; padding: 0 15px; font-size: 1.1rem;">
                    " Since we are long distanced now, i have a virtual cake for you to cut it, please cut the cake my dear sister "
                </p>
                <p id="tap-hint" style="font-size: 0.9rem; color: var(--dark-pink); margin-top: 15px; font-style: italic;">
                    (Tap the cake to cut it! 🔪)
                </p>
            </div>
        </section>
    </div>

    <script>
        const music = document.getElementById('bg-music');
        const wishes = ["Love you more deebhoo 🎈", "MY mudinja alavuku suprise 🎁", "Eppayume luv u 💖", "Happy birthday deebhu 🎂"];
        const photoLinks = ["_47A9352.jpg", "20200904_16412-5-01.jpeg", "20201209_170057.jpg", "DSC_0022.JPG", "DSC_0069.JPG", "DSC_0073(1).JPG", "DSC_0159-01(1)-01.jpg", "DSC_0292.JPG", "DSC_0295.JPG", "DSC_0388.JPG", "DSC_0570.JPG", "IMG_20200513_222703_919.jpg", "IMG_20200520_71025_921.jpg", "IMG-20211019-WA0009.jpg", "IMG-20221127-WA0026.jpg", "IMG-20250819-WA0075.jpg", "IMG-20250821-WA0039.jpg", "IMG-20250821-WA0066.jpg", "Snapchat-784488938-01.jpg"];

        const bgContainer = document.getElementById('collage-background');
        for (let i = 0; i < 64; i++) {
            const img = document.createElement('img');
            img.src = photoLinks[i % photoLinks.length]; 
            img.className = 'bg-photo-slot';
            bgContainer.appendChild(img);
        }

        function toggleMusic() { music.paused ? music.play() : music.pause(); }
        function startApp() { music.play(); nextPage(1, 2); }
        function nextPage(curr, next) {
            document.getElementById('page'+curr).classList.remove('active');
            document.getElementById('page'+next).classList.add('active');
            if(next === 3) startTypewriter();
        }

        function goToCake() {
            hugeExplosion();
            setTimeout(() => { nextPage(3, 4); }, 1200);
        }

        function cutCake() {
            const cake = document.getElementById('cake-display');
            const header = document.getElementById('cake-header');
            const hint = document.getElementById('tap-hint');
            
            cake.innerText = '🍰';
            cake.style.transform = 'scale(1.5)';
            setTimeout(() => { cake.style.transform = 'scale(1)'; }, 200);

            header.innerText = 'Happy Birthday! 🥳';
            hint.innerText = 'The first slice is for you! ❤️';
            hugeExplosion();
        }

        function reveal(el, idx) { 
            if(el.classList.contains('revealed')) return;
            el.classList.add('revealed');
            el.innerText = wishes[idx]; 
        }

        function startTypewriter() {
            const text = "To the best sister: You're my anchor and my best friend. May your day be filled as your brightest, cute smile. Happy Birthday! ✨💖";
            let i = 0; const dest = document.getElementById("typewriter-text");
            dest.innerHTML = "";
            const interval = setInterval(() => {
                dest.innerHTML += text.charAt(i); i++;
                if(i >= text.length) clearInterval(interval);
            }, 20); 
        }

        function hugeExplosion() {
            const emojis = ['💖','❤️','🌸','✨','🌟','🎁','🎂','🎈','🎀','🧁','💎','🌈'];
            for(let i=0; i < 450; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                p.style.left = '50%'; p.style.top = '50%';
                document.body.appendChild(p);
                const angle = Math.random() * Math.PI * 2;
                const velocity = 150 + Math.random() * 600; 
                const destX = Math.cos(angle) * velocity;
                const destY = Math.sin(angle) * velocity;
                const duration = 4000 + Math.random() * 4000;

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(0) rotate(0deg)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${destX}px), calc(-50% + ${destY}px)) scale(1.5) rotate(360deg)`, opacity: 1, offset: 0.3 },
                    { transform: `translate(calc(-50% + ${destX + (Math.random()-0.5)*100}px), calc(-50% + ${destY + 500}px)) scale(0.5) rotate(720deg)`, opacity: 0 }
                ], { 
                    duration: duration, 
                    easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)',
                    fill: 'forwards' 
                });
                setTimeout(() => p.remove(), duration);
            }
        }

        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];
        function init() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            hearts = Array.from({length: 40}, () => ({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*15+5, o: Math.random()*0.3+0.1, sp: Math.random()*0.5 + 0.2 }));
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#ffb7c5';
            hearts.forEach(h => { ctx.globalAlpha = h.o; ctx.beginPath(); ctx.arc(h.x, h.y, h.s, 0, Math.PI*2); ctx.fill(); h.y -= h.sp; if(h.y < -30) h.y = canvas.height + 30; });
            requestAnimationFrame(draw);
        }
        init(); draw();

        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.classList.add('falling-heart');
            const icons = ['❤️', '💖', '🌸', '💕', '✨'];
            heart.innerText = icons[Math.floor(Math.random() * icons.length)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 4 + "s";
            heart.style.opacity = Math.random() * 0.4 + 0.3;
            heart.style.fontSize = Math.random() * 10 + 15 + "px";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createFallingHeart, 400);
    </script>
</body>
</html>
